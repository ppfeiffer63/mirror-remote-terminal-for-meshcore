name: Mirror – Remote-Terminal-for-MeshCore → Forgejo

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Upstream HEAD prüfen
        id: check
        run: |
          UPSTREAM_HEAD=$(git ls-remote https://github.com/jkingsman/Remote-Terminal-for-MeshCore.git HEAD | cut -f1)
          echo "upstream_head=${UPSTREAM_HEAD}" >> "$GITHUB_OUTPUT"
          echo "Upstream HEAD: ${UPSTREAM_HEAD}"

      - name: Spiegel zu Forgejo pushen
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_URL: ${{ vars.FORGEJO_URL }}
          FORGEJO_MIRROR_REPO: ${{ vars.FORGEJO_MIRROR_REPO }}
        run: |
          git clone --mirror \
            https://github.com/jkingsman/Remote-Terminal-for-MeshCore.git \
            repo.git

          cd repo.git

          git push --mirror \
            "https://oauth2:${FORGEJO_TOKEN}@${FORGEJO_URL}/${FORGEJO_MIRROR_REPO}.git"

          echo "Sync abgeschlossen: ${{ steps.check.outputs.upstream_head }}"
